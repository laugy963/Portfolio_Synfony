<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Illustration de projet par defaut</title>
  <desc id="desc">Image de secours utilisee lorsqu un projet ne possede pas encore de media.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="28" />
  <g fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="10">
    <rect x="84" y="72" width="472" height="216" rx="18" />
    <path d="M136 232l78-74 70 54 92-96 128 116" />
  </g>
  <g fill="#ffffff">
